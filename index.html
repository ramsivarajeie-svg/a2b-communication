<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Machine A - Full Stack Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-auth { background: #1a73e8; color: white; }
        .btn-auth:hover { background: #1557b0; }
        .btn-toggle { background: #34a853; color: white; height: 60px; margin-top: 20px; }
        .hidden { display: none; }
        #msg { color: #d93025; font-size: 13px; margin-top: 10px; min-height: 15px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="authBox" class="card">
        <h2>M2M Portal</h2>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        
        <button class="btn-auth" onclick="handleSignUp()">CREATE ACCOUNT</button>
        <button style="background:none; color:#1a73e8; font-size:14px;" onclick="handleLogin()">Already have an account? Login</button>
        
        <p id="msg"></p>
    </div>

    <div id="controlBox" class="card hidden">
        <h2>Control Panel</h2>
        <p style="font-size: 14px; color: #5f6368;">User: <span id="activeUser" style="font-weight: bold;"></span></p>
        <hr>
        <p>Remote LED Status:</p>
        <button id="ledBtn" class="btn-toggle">CONNECTING...</button>
        <br>
        <button style="background:none; color:#5f6368; font-size: 12px; margin-top: 20px;" onclick="location.reload()">LOGOUT</button>
    </div>

    <script type="module">
        // Import Firebase Functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // YOUR UPDATED CONFIGURATION
        const firebaseConfig = {
  apiKey: "AIzaSyBxNbxjlu8WYFtJbVSoJaHvQ4fPHgb-28Q",
  authDomain: "a2b-communication.firebaseapp.com",
  databaseURL: "https://a2b-communication-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "a2b-communication",
  storageBucket: "a2b-communication.firebasestorage.app",
  messagingSenderId: "467373364936",
  appId: "1:467373364936:web:6e0ad72ba801bcda34b7fd"
};

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- A. REGISTRATION ---
        window.handleSignUp = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Save user to Realtime Database so Machine B can count them
                    set(ref(db, 'registrations/' + userCredential.user.uid), {
                        email: email,
                        signupTime: Date.now()
                    });
                    loadDashboard(email);
                })
                .catch((err) => document.getElementById('msg').innerText = "Error: " + err.message);
        };

        // --- B. LOGIN ---
        window.handleLogin = function() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => loadDashboard(email))
                .catch((err) => document.getElementById('msg').innerText = "Login Failed: " + err.message);
        };

        // --- C. DASHBOARD CONTROL ---
        function loadDashboard(email) {
            document.getElementById('authBox').classList.add('hidden');
            document.getElementById('controlBox').classList.remove('hidden');
            document.getElementById('activeUser').innerText = email;

            const ledRef = ref(db, 'device/led');
            let status = false;

            // Sync with Database in Real-time
            onValue(ledRef, (snapshot) => {
                status = snapshot.val();
                const btn = document.getElementById('ledBtn');
                btn.innerText = status ? "LED IS ON" : "LED IS OFF";
                btn.style.background = status ? "#ea4335" : "#34a853"; // Red for Off, Green for On
            });

            // Handle Toggle Click
            document.getElementById('ledBtn').onclick = () => {
                set(ledRef, !status); // Flip the value in Firebase
            };
        }
    </script>
</body>
</html>
